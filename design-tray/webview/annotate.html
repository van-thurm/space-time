<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annotate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1e1e;
      color: #cccccc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #toolbar {
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar button {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: #cccccc;
      cursor: pointer;
      font-size: 12px;
      padding: 4px 8px;
      white-space: nowrap;
    }

    #toolbar button:hover { background: #3c3c3c; }

    #toolbar button.active {
      background: #0e639c;
      border-color: #0e639c;
      color: #ffffff;
    }

    #toolbar button:disabled {
      opacity: 0.35;
      cursor: default;
    }
    #toolbar button:disabled:hover { background: transparent; }

    .separator {
      width: 1px;
      height: 20px;
      background: #3c3c3c;
      margin: 0 4px;
      flex-shrink: 0;
    }

    #colorPicker {
      width: 28px;
      height: 28px;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      cursor: pointer;
      padding: 2px;
      background: #252526;
    }

    #zoomLabel {
      color: #999;
      font-size: 11px;
      min-width: 36px;
      text-align: center;
      user-select: none;
    }

    .spacer { flex: 1; }

    #canvasWrap {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #canvas {
      display: block;
      cursor: crosshair;
      transform-origin: 0 0;
    }

    #canvasContainer {
      display: none;
      position: relative;
    }

    #placeholder {
      color: #555;
      font-size: 14px;
      text-align: center;
      margin: auto;
      padding: 40px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="toolPen" class="active" title="Pen">&#9999; Pen</button>
    <button id="toolArrow" title="Arrow">&#8599; Arrow</button>
    <button id="toolRect" title="Rectangle">&#9645; Rect</button>
    <button id="toolText" title="Text">T Text</button>
    <div class="separator"></div>
    <input type="color" id="colorPicker" value="#ff3b3b" title="Color">
    <div class="separator"></div>
    <button id="undoBtn" title="Undo (Cmd/Ctrl+Z)" disabled>&#8630; Undo</button>
    <div class="separator"></div>
    <button id="zoomFit" title="Fit to window">Fit</button>
    <button id="zoomOut" title="Zoom out">&#8722;</button>
    <span id="zoomLabel">100%</span>
    <button id="zoomIn" title="Zoom in">+</button>
    <div class="spacer"></div>
    <button id="saveBtn" title="Save to file">&#11015; Save</button>
    <button id="copyBtn" title="Copy to clipboard">&#9112; Copy</button>
  </div>
  <div id="canvasWrap">
    <div id="placeholder">Waiting for screenshot&hellip;</div>
    <div id="canvasContainer">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const placeholder = document.getElementById('placeholder');
    const canvasWrap = document.getElementById('canvasWrap');
    const canvasContainer = document.getElementById('canvasContainer');

    vscode.postMessage({ type: 'ready' });

    let currentTool = 'pen';
    let isDrawing = false;
    let startX = 0, startY = 0;
    let snapshotBeforeShape = null;
    let color = '#ff3b3b';

    // -- Undo stack (ImageData snapshots, max 50) --
    const MAX_UNDO = 50;
    const undoStack = [];
    const undoBtn = document.getElementById('undoBtn');

    function pushUndo() {
      undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
      if (undoStack.length > MAX_UNDO) undoStack.shift();
      undoBtn.disabled = false;
    }

    function performUndo() {
      if (undoStack.length === 0) return;
      const prev = undoStack.pop();
      ctx.putImageData(prev, 0, 0);
      undoBtn.disabled = undoStack.length === 0;
    }

    undoBtn.addEventListener('click', performUndo);
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'z') {
        e.preventDefault();
        performUndo();
      }
    });

    // -- Zoom --
    const ZOOM_LEVELS = [0.25, 0.5, 0.75, 1, 1.5, 2];
    let currentZoom = 1;
    let nativeWidth = 0;
    let nativeHeight = 0;
    const zoomLabel = document.getElementById('zoomLabel');

    function fitZoom() {
      if (!nativeWidth) return 1;
      const wrapRect = canvasWrap.getBoundingClientRect();
      const pad = 16;
      const scaleX = (wrapRect.width - pad) / nativeWidth;
      const scaleY = (wrapRect.height - pad) / nativeHeight;
      return Math.min(scaleX, scaleY, 1);
    }

    function applyZoom(z) {
      currentZoom = z;
      canvas.style.transform = 'scale(' + z + ')';
      canvasContainer.style.width = Math.ceil(nativeWidth * z) + 'px';
      canvasContainer.style.height = Math.ceil(nativeHeight * z) + 'px';
      zoomLabel.textContent = Math.round(z * 100) + '%';
    }

    document.getElementById('zoomFit').addEventListener('click', () => applyZoom(fitZoom()));
    document.getElementById('zoomIn').addEventListener('click', () => {
      const next = ZOOM_LEVELS.find(l => l > currentZoom + 0.001);
      if (next) applyZoom(next);
    });
    document.getElementById('zoomOut').addEventListener('click', () => {
      const prev = [...ZOOM_LEVELS].reverse().find(l => l < currentZoom - 0.001);
      if (prev) applyZoom(prev);
    });

    // -- Tool buttons --
    const tools = { pen: 'toolPen', arrow: 'toolArrow', rect: 'toolRect', text: 'toolText' };
    Object.entries(tools).forEach(([tool, id]) => {
      document.getElementById(id).addEventListener('click', () => {
        currentTool = tool;
        Object.values(tools).forEach(bid => document.getElementById(bid).classList.remove('active'));
        document.getElementById(id).classList.add('active');
      });
    });

    document.getElementById('colorPicker').addEventListener('input', (e) => {
      color = e.target.value;
    });

    // -- Receive image from extension --
    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (msg.type === 'image') {
        const img = new Image();
        img.onload = () => {
          nativeWidth = img.naturalWidth;
          nativeHeight = img.naturalHeight;
          canvas.width = nativeWidth;
          canvas.height = nativeHeight;
          ctx.drawImage(img, 0, 0);
          placeholder.style.display = 'none';
          canvasContainer.style.display = 'block';
          applyZoom(fitZoom());
          pushUndo();
        };
        img.src = msg.dataUrl;
      }
    });

    // -- Drawing helpers --
    function canvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height),
      };
    }

    canvas.addEventListener('mousedown', (e) => {
      const { x, y } = canvasCoords(e);
      startX = x;
      startY = y;

      if (currentTool === 'text') {
        const text = window.prompt('Enter text:');
        if (text) {
          pushUndo();
          ctx.font = '16px sans-serif';
          ctx.fillStyle = color;
          ctx.fillText(text, startX, startY);
        }
        return;
      }

      isDrawing = true;

      if (currentTool === 'pen') {
        pushUndo();
      } else if (currentTool === 'arrow' || currentTool === 'rect') {
        snapshotBeforeShape = ctx.getImageData(0, 0, canvas.width, canvas.height);
        pushUndo();
      }
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isDrawing) return;
      const { x, y } = canvasCoords(e);

      if (currentTool === 'pen') {
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.moveTo(startX, startY);
        ctx.lineTo(x, y);
        ctx.stroke();
        startX = x;
        startY = y;
      } else if (currentTool === 'arrow' || currentTool === 'rect') {
        ctx.putImageData(snapshotBeforeShape, 0, 0);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        if (currentTool === 'rect') {
          ctx.beginPath();
          ctx.strokeRect(startX, startY, x - startX, y - startY);
        } else {
          drawArrow(startX, startY, x, y);
        }
      }
    });

    canvas.addEventListener('mouseup', () => {
      isDrawing = false;
      snapshotBeforeShape = null;
    });

    canvas.addEventListener('mouseleave', () => {
      if (isDrawing && (currentTool === 'arrow' || currentTool === 'rect')) {
        isDrawing = false;
        snapshotBeforeShape = null;
      }
    });

    function drawArrow(x1, y1, x2, y2) {
      const headLen = 12;
      const angle = Math.atan2(y2 - y1, x2 - x1);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI / 6), y2 - headLen * Math.sin(angle - Math.PI / 6));
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI / 6), y2 - headLen * Math.sin(angle + Math.PI / 6));
      ctx.stroke();
    }

    // -- Save / Copy (always at native resolution) --
    document.getElementById('saveBtn').addEventListener('click', () => {
      vscode.postMessage({ type: 'save', dataUrl: canvas.toDataURL('image/png') });
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      vscode.postMessage({ type: 'copy', dataUrl: canvas.toDataURL('image/png') });
    });
  </script>
</body>
</html>
