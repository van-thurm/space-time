<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annotate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1e1e;
      color: #cccccc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #toolbar {
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      flex-shrink: 0;
    }

    #toolbar button {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: #cccccc;
      cursor: pointer;
      font-size: 12px;
      padding: 4px 8px;
      white-space: nowrap;
    }

    #toolbar button:hover {
      background: #3c3c3c;
    }

    #toolbar button.active {
      background: #0e639c;
      border-color: #0e639c;
      color: #ffffff;
    }

    .separator {
      width: 1px;
      height: 20px;
      background: #3c3c3c;
      margin: 0 4px;
      flex-shrink: 0;
    }

    #colorPicker {
      width: 28px;
      height: 28px;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      cursor: pointer;
      padding: 2px;
      background: #252526;
    }

    #saveBtn, #copyBtn {
      margin-left: auto;
    }
    #saveBtn { margin-left: auto; }
    #copyBtn { margin-left: 0; }

    #canvasWrap {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    #canvas {
      display: block;
      cursor: crosshair;
    }

    #placeholder {
      color: #555;
      font-size: 14px;
      text-align: center;
      margin: auto;
      padding: 40px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="toolPen" class="active" title="Pen">✏ Pen</button>
    <button id="toolArrow" title="Arrow">↗ Arrow</button>
    <button id="toolRect" title="Rectangle">▭ Rect</button>
    <button id="toolText" title="Text">T Text</button>
    <div class="separator"></div>
    <input type="color" id="colorPicker" value="#ff3b3b" title="Color">
    <div class="separator"></div>
    <button id="saveBtn" title="Save to file">⬇ Save</button>
    <button id="copyBtn" title="Copy to clipboard">⎘ Copy</button>
  </div>
  <div id="canvasWrap">
    <div id="placeholder">Waiting for screenshot…</div>
    <canvas id="canvas" style="display:none;"></canvas>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const placeholder = document.getElementById('placeholder');

    // Signal extension that webview is ready to receive the image
    vscode.postMessage({ type: 'ready' });

    let currentTool = 'pen';
    let isDrawing = false;
    let startX = 0, startY = 0;
    let snapshotBeforeShape = null;
    let color = '#ff3b3b';

    // Tool buttons
    const tools = { pen: 'toolPen', arrow: 'toolArrow', rect: 'toolRect', text: 'toolText' };
    Object.entries(tools).forEach(([tool, id]) => {
      document.getElementById(id).addEventListener('click', () => {
        currentTool = tool;
        Object.values(tools).forEach(bid => document.getElementById(bid).classList.remove('active'));
        document.getElementById(id).classList.add('active');
      });
    });

    document.getElementById('colorPicker').addEventListener('input', (e) => {
      color = e.target.value;
    });

    // Receive image from extension
    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (msg.type === 'image') {
        const img = new Image();
        img.onload = () => {
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          ctx.drawImage(img, 0, 0);
          placeholder.style.display = 'none';
          canvas.style.display = 'block';
        };
        img.src = msg.dataUrl;
      }
    });

    // Drawing
    canvas.addEventListener('mousedown', (e) => {
      isDrawing = true;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      startX = (e.clientX - rect.left) * scaleX;
      startY = (e.clientY - rect.top) * scaleY;

      if (currentTool === 'arrow' || currentTool === 'rect') {
        snapshotBeforeShape = ctx.getImageData(0, 0, canvas.width, canvas.height);
      }

      if (currentTool === 'text') {
        isDrawing = false;
        const text = window.prompt('Enter text:');
        if (text) {
          ctx.font = '16px sans-serif';
          ctx.fillStyle = color;
          ctx.fillText(text, startX, startY);
        }
      }
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isDrawing) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;

      if (currentTool === 'pen') {
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.moveTo(startX, startY);
        ctx.lineTo(x, y);
        ctx.stroke();
        startX = x;
        startY = y;
      } else if (currentTool === 'arrow' || currentTool === 'rect') {
        ctx.putImageData(snapshotBeforeShape, 0, 0);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        if (currentTool === 'rect') {
          ctx.beginPath();
          ctx.strokeRect(startX, startY, x - startX, y - startY);
        } else {
          drawArrow(startX, startY, x, y);
        }
      }
    });

    canvas.addEventListener('mouseup', () => {
      isDrawing = false;
      snapshotBeforeShape = null;
    });

    canvas.addEventListener('mouseleave', () => {
      if (isDrawing && (currentTool === 'arrow' || currentTool === 'rect')) {
        isDrawing = false;
        snapshotBeforeShape = null;
      }
    });

    function drawArrow(x1, y1, x2, y2) {
      const headLen = 12;
      const angle = Math.atan2(y2 - y1, x2 - x1);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI / 6), y2 - headLen * Math.sin(angle - Math.PI / 6));
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI / 6), y2 - headLen * Math.sin(angle + Math.PI / 6));
      ctx.stroke();
    }

    document.getElementById('saveBtn').addEventListener('click', () => {
      vscode.postMessage({ type: 'save', dataUrl: canvas.toDataURL('image/png') });
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      vscode.postMessage({ type: 'copy', dataUrl: canvas.toDataURL('image/png') });
    });
  </script>
</body>
</html>
