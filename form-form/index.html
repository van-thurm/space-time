<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>form form</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="form form">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- Open Graph -->
<meta property="og:title" content="form form">
<meta property="og:description" content="Build beautiful Google Apps Script forms — visually. Design, preview, and export.">
<meta property="og:type" content="website">
<meta property="og:image" content="og-image.png">

<!-- Prevent Safari Reader -->
<meta name="robots" content="noindex">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #f5f5f5; color: #1c1917; }

  .layout { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 48px); }

  .editor { padding: 0 24px 24px 24px; overflow-y: auto; border-right: 1px solid #e5e5e5; background: #fff; }
  .preview-pane { overflow-y: auto; background: #f5f5f5; }
  .preview-pane iframe { width: 100%; height: 100%; border: none; }

  .nav-download { display: none; }
  .nav-download.visible { display: inline-flex; }
  .subtitle { font-size: 12px; color: #a3a3a3; margin-bottom: 16px; margin-top: 16px; padding-top: 16px; letter-spacing: 0.01em; }

  .form-meta { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e5e5e5; }
  .form-meta > .design-toggle { margin-bottom: 8px; }

  .question-card {
    background: #f5f5f5; border: 1px solid #e5e5e5; border-radius: 10px;
    padding: 16px; margin-bottom: 12px; position: relative;
  }
  .question-card.dragging { opacity: 0.5; }
  .question-card .q-header { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .question-card .q-num {
    width: 24px; height: 24px; border-radius: 50%; background: #1c1917; color: #fff;
    font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .question-card .q-title-input {
    flex: 1; padding: 6px 8px; border: 1px solid #d4d4d4; border-radius: 6px;
    font-family: inherit; font-size: 14px; font-weight: 400;
  }
  .question-card .q-actions { display: flex; gap: 4px; }
  .question-card .q-actions button {
    background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 4px;
    font-size: 16px; color: #737373;
  }
  .question-card .q-actions button:hover { background: #e5e5e5; }

  .q-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .q-row label { font-size: 11px; font-weight: 500; color: #a3a3a3; min-width: 60px; text-transform: uppercase; letter-spacing: 0.04em; }
  .q-row select, .q-row input[type="text"], .q-row input[type="number"] {
    padding: 5px 8px; border: 1px solid #d4d4d4; border-radius: 6px;
    font-family: inherit; font-size: 13px;
  }
  .q-row select { min-width: 140px; }
  .q-row input[type="number"] { width: 60px; }

  .q-hint-input {
    flex: 1; min-width: 0; padding: 5px 8px; border: 1px solid #d4d4d4; border-radius: 6px;
    font-family: inherit; font-size: 13px; color: #525252;
  }

  .options-list { margin-top: 8px; }
  .option-row {
    display: flex; gap: 6px; align-items: center; margin-bottom: 6px;
  }
  .option-row input {
    flex: 3; padding: 5px 8px; border: 1px solid #d4d4d4; border-radius: 6px;
    font-family: inherit; font-size: 13px; min-width: 0;
  }
  .option-row .sub-input { flex: 2; font-size: 12px; color: #737373; }
  .option-row button {
    background: none; border: none; cursor: pointer; color: #dc2626; font-size: 16px; padding: 2px 4px;
  }
  .add-option-btn {
    background: none; border: 1px dashed #d4d4d4; border-radius: 6px; padding: 5px 10px;
    font-family: inherit; font-size: 12px; font-weight: 400; color: #a3a3a3; cursor: pointer; margin-top: 4px;
  }
  .add-option-btn:hover { border-color: #525252; color: #525252; }

  .checkbox-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .checkbox-row input[type="checkbox"] { margin: 0; accent-color: #525252; }
  .checkbox-row label { font-size: 12px; font-weight: 400; color: #737373; min-width: auto; }

  .add-question-btn {
    width: 100%; padding: 12px; border: 2px dashed #d4d4d4; border-radius: 10px;
    background: none; font-family: inherit; font-size: 13px; font-weight: 400;
    color: #a3a3a3; cursor: pointer; margin-bottom: 16px;
  }
  .add-question-btn:hover { border-color: #525252; color: #525252; }

  .editor-footer {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 24px 0 12px 0; margin-top: 8px;
    border-top: 1px solid #e5e5e5;
  }
  .vt-logo { color: #a3a3a3; }
  .vt-credit { font-size: 11px; color: #a3a3a3; letter-spacing: 0.04em; }

  .btn {
    padding: 6px 14px; border: none; border-radius: 6px; font-family: inherit;
    font-size: 12px; font-weight: 500; cursor: pointer; letter-spacing: 0.02em;
  }
  .btn-primary { background: #1c1917; color: #fff; }
  .btn-primary:hover { background: #404040; }
  .btn-secondary { background: #fff; color: #1c1917; border: 1px solid #d4d4d4; }
  .btn-secondary:hover { background: #f5f5f5; }

  .design-controls { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e5e5e5; }
  .design-toggle {
    font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em;
    color: #a3a3a3; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    list-style: none; user-select: none; padding: 4px 6px; margin-left: -6px; border-radius: 6px;
  }
  .design-toggle::-webkit-details-marker { display: none; }
  .design-toggle:hover { color: #1c1917; background: #f0f0f0; }
  .toggle-chevron { width: 10px; height: 10px; transition: transform 0.2s ease; flex-shrink: 0; }
  details[open] > .design-toggle .toggle-chevron { transform: rotate(90deg); }
  .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .theme-swatch {
    border: 2px solid #e5e5e5; border-radius: 8px; padding: 10px; cursor: pointer;
    text-align: center; transition: all 0.15s ease; position: relative;
  }
  .theme-swatch:hover { border-color: #a3a3a3; }
  .theme-swatch.active { border-color: #1c1917; box-shadow: 0 0 0 2px rgba(28,25,23,0.12); }
  .theme-swatch .swatch-preview {
    height: 40px; border-radius: 6px; margin-bottom: 6px; display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .theme-swatch .swatch-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.3); }
  .theme-swatch .swatch-name { font-size: 11px; font-weight: 400; color: #737373; }
  .design-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .design-row label { font-size: 11px; font-weight: 500; color: #a3a3a3; min-width: 100px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.04em; }
  .design-row select { padding: 5px 8px; border: 1px solid #d4d4d4; border-radius: 6px; font-family: inherit; font-size: 13px; flex: 1; }
  .design-row input[type="text"] { padding: 5px 8px; border: 1px solid #d4d4d4; border-radius: 6px; font-family: inherit; font-size: 13px; flex: 1; }
  .design-row textarea { padding: 6px 8px; border: 1px solid #d4d4d4; border-radius: 6px; font-family: inherit; font-size: 13px; flex: 1; min-height: 52px; resize: vertical; }

  .font-search-wrap { position: relative; flex: 1; }
  .font-search-btn {
    width: 100%; padding: 5px 8px; border: 1px solid #d4d4d4; border-radius: 6px;
    font-family: inherit; font-size: 13px; background: #fff; color: #1c1917;
    cursor: pointer; text-align: left; display: flex; align-items: center; justify-content: space-between;
  }
  .font-search-btn::after { content: '▾'; font-size: 10px; color: #a3a3a3; }
  .font-dd {
    position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px; z-index: 50;
    background: #fff; border: 1px solid #e5e5e5; border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08); overflow: hidden;
  }
  .font-dd.hidden { display: none; }
  .font-dd-search {
    width: 100%; padding: 8px 10px; border: none; border-bottom: 1px solid #e5e5e5;
    font-family: inherit; font-size: 13px; outline: none;
  }
  .font-dd-filters { display: flex; gap: 2px; padding: 6px 8px; border-bottom: 1px solid #f0f0f0; }
  .font-dd-filter {
    font-family: inherit; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 4px;
    border: none; background: none; color: #737373; cursor: pointer; letter-spacing: 0.02em;
  }
  .font-dd-filter:hover { background: #f5f5f5; }
  .font-dd-filter.active { background: #1c1917; color: #fff; }
  .font-dd-list { max-height: 220px; overflow-y: auto; padding: 4px; }
  .font-dd-item {
    padding: 6px 8px; border-radius: 4px; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
  }
  .font-dd-item:hover { background: #f5f5f5; }
  .font-dd-item.active { font-weight: 600; background: #f0f0f0; }
  .font-dd-item .font-cat { font-size: 10px; color: #a3a3a3; text-transform: uppercase; letter-spacing: 0.04em; }
  .font-dd-empty { padding: 16px; text-align: center; font-size: 12px; color: #a3a3a3; }

  .accent-picker { display: flex; align-items: center; gap: 8px; flex: 1; }
  .accent-picker input[type="color"] {
    width: 32px; height: 28px; border: 1px solid #d4d4d4; border-radius: 6px;
    cursor: pointer; padding: 2px; background: #fff;
  }
  .accent-hex { font-size: 12px; color: #737373; font-family: ui-monospace, 'SF Mono', 'Menlo', monospace; }
  .contrast-warning {
    font-size: 10px; font-weight: 600; color: #b45309; background: #fef3c7;
    padding: 2px 6px; border-radius: 4px; white-space: nowrap; letter-spacing: 0.02em;
  }
  .contrast-warning.pass { color: #15803d; background: #dcfce7; }

  /* Mobile: stack layout with tab toggle */
  .mobile-tabs {
    display: none; background: #fff; border-bottom: 1px solid #e5e5e5;
    padding: 0 16px; position: sticky; top: 0; z-index: 10;
  }
  .mobile-tabs button {
    padding: 12px 16px; border: none; background: none; font-family: inherit;
    font-size: 13px; font-weight: 500; color: #a3a3a3; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px; letter-spacing: 0.02em;
  }
  .mobile-tabs button.active { color: #1c1917; border-bottom-color: #1c1917; }

  .btn-icon {
    width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center;
    background: none; border: 1px solid #d4d4d4; border-radius: 6px; cursor: pointer; color: #737373;
    transition: color 0.2s, background 0.2s, border-color 0.2s;
  }
  .btn-icon:hover { background: #f5f5f5; color: #1c1917; }
  .btn-icon svg { width: 16px; height: 16px; }

  /* Dark mode — editor only */
  .editor.dark { background: #1c1917; color: #e5e5e5; border-right-color: #2e2a27; }
  .editor.dark .subtitle { color: #737373; }
  
  .editor.dark .form-meta { border-bottom-color: #2e2a27; }
  .editor.dark .form-meta label { color: #737373; }
  .editor.dark .form-meta input,
  .editor.dark .form-meta textarea {
    background: #2e2a27; border-color: #3d3835; color: #e5e5e5;
  }
  .editor.dark .question-card { background: #2e2a27; border-color: #3d3835; }
  .editor.dark .question-card .q-num { background: #e5e5e5; color: #1c1917; }
  .editor.dark .question-card .q-title-input { background: #1c1917; border-color: #3d3835; color: #e5e5e5; }
  .editor.dark .question-card .q-actions button { color: #737373; }
  .editor.dark .question-card .q-actions button:hover { background: #3d3835; }
  .editor.dark .q-row label { color: #737373; }
  .editor.dark .q-row select,
  .editor.dark .q-row input[type="text"],
  .editor.dark .q-row input[type="number"] { background: #1c1917; border-color: #3d3835; color: #e5e5e5; }
  .editor.dark .q-hint-input { background: #1c1917; border-color: #3d3835; color: #a3a3a3; }
  .editor.dark .option-row input { background: #1c1917; border-color: #3d3835; color: #e5e5e5; }
  .editor.dark .option-row button { color: #ef4444; }
  .editor.dark .add-option-btn { border-color: #3d3835; color: #737373; }
  .editor.dark .add-option-btn:hover { border-color: #737373; color: #a3a3a3; }
  .editor.dark .checkbox-row label { color: #737373; }
  .editor.dark .checkbox-row input[type="checkbox"] { accent-color: #a3a3a3; }
  .editor.dark .add-question-btn { border-color: #3d3835; color: #737373; }
  .editor.dark .add-question-btn:hover { border-color: #737373; color: #a3a3a3; }
  .editor.dark .design-controls { border-bottom-color: #2e2a27; }
  .editor.dark .design-toggle { color: #737373; }
  .editor.dark .design-toggle:hover { color: #e5e5e5; background: #2e2a27; }
  .editor.dark .theme-swatch { border-color: #3d3835; }
  .editor.dark .theme-swatch:hover { border-color: #737373; }
  .editor.dark .theme-swatch.active { border-color: #e5e5e5; box-shadow: 0 0 0 2px rgba(229,229,229,0.12); }
  .editor.dark .theme-swatch .swatch-name { color: #a3a3a3; }
  .editor.dark .design-row label { color: #737373; }
  .editor.dark .design-row select,
  .editor.dark .design-row input[type="text"] { background: #1c1917; border-color: #3d3835; color: #e5e5e5; }
  .editor.dark .accent-picker input[type="color"] { background: #2e2a27; border-color: #3d3835; }
  .editor.dark .accent-hex { color: #a3a3a3; }
  .editor.dark .contrast-warning { color: #fbbf24; background: #422006; }
  .editor.dark .contrast-warning.pass { color: #4ade80; background: #052e16; }
  .editor.dark .btn-primary { background: #e5e5e5; color: #1c1917; }
  .editor.dark .btn-primary:hover { background: #d4d4d4; }
  .editor.dark .btn-secondary { background: #2e2a27; color: #e5e5e5; border-color: #3d3835; }
  .editor.dark .btn-secondary:hover { background: #3d3835; }
  .editor.dark .btn-icon { border-color: #3d3835; color: #737373; }
  .editor.dark .btn-icon:hover { background: #2e2a27; color: #e5e5e5; }
  .editor.dark .font-search-btn { background: #1c1917; border-color: #3d3835; color: #e5e5e5; }
  .editor.dark .font-dd { background: #1c1917; border-color: #3d3835; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .editor.dark .font-dd-search { background: #1c1917; border-bottom-color: #3d3835; color: #e5e5e5; }
  .editor.dark .font-dd-search::placeholder { color: #737373; }
  .editor.dark .font-dd-filters { border-bottom-color: #2e2a27; }
  .editor.dark .font-dd-filter:hover { background: #2e2a27; }
  .editor.dark .font-dd-filter.active { background: #e5e5e5; color: #1c1917; }
  .editor.dark .font-dd-item:hover { background: #2e2a27; }
  .editor.dark .font-dd-item.active { background: #2e2a27; }
  .editor.dark .editor-footer { border-top-color: #2e2a27; }
  .editor.dark .vt-logo { color: #525252; }
  .editor.dark .vt-credit { color: #525252; }

  /* ── App nav ── */
  .app-nav {
    position: sticky; top: 0; z-index: 30; background: #fff;
    border-bottom: 1px solid #e5e5e5; padding: 0 20px;
    display: flex; align-items: center; justify-content: space-between; height: 48px;
  }
  .app-nav-left { display: flex; align-items: center; gap: 20px; }
  .nav-logo { display: flex; align-items: center; color: #1c1917; text-decoration: none; }
  .nav-logo svg { height: 18px; width: auto; flex-shrink: 0; }
  .app-nav-right { display: flex; align-items: center; gap: 6px; }
  .page-tabs { display: flex; gap: 0; height: 48px; }
  .page-tabs button {
    padding: 0 12px; border: none; background: none; font-family: inherit;
    font-size: 13px; font-weight: 500; color: #a3a3a3; cursor: pointer;
    border-bottom: 2px solid transparent; letter-spacing: 0.02em; transition: color 0.15s;
  }
  .page-tabs button:hover { color: #737373; }
  .page-tabs button.active { color: #1c1917; border-bottom-color: #1c1917; }
  .page-tabs button:focus-visible { outline: 2px solid #1c1917; outline-offset: -2px; }

  /* ── Page containers ── */
  .page-view.hidden { display: none; }

  /* ── Lists page ── */
  .lists-shell { max-width: 960px; margin: 0 auto; min-height: calc(100vh - 48px); display: flex; flex-direction: column; }

  .list-switcher { position: relative; padding: 12px 20px 0; }
  .list-switcher-btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px 5px 8px;
    border: 1px solid #e5e5e5; border-radius: 6px; background: #fff; color: #737373;
    font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer;
    transition: border-color 0.15s, color 0.15s; letter-spacing: 0.01em;
  }
  .list-switcher-btn:hover { border-color: #d4d4d4; color: #1c1917; }
  .list-switcher-btn svg { width: 10px; height: 10px; flex-shrink: 0; }
  .list-switcher-btn .sw-icon { width: 14px; height: 14px; }
  .list-switcher-dropdown {
    position: absolute; top: 100%; left: 20px; margin-top: 4px; min-width: 220px;
    background: #fff; border: 1px solid #e5e5e5; border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08); z-index: 25; padding: 6px; overflow: hidden;
  }
  .list-switcher-dropdown.hidden { display: none; }
  .sw-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px;
    font-size: 13px; cursor: pointer; color: #1c1917; border: none; background: none;
    width: 100%; text-align: left; font-family: inherit; transition: background 0.1s;
  }
  .sw-item:hover { background: #f5f5f5; }
  .sw-item.active { font-weight: 600; }
  .sw-item.active::after { content: '✓'; margin-left: auto; font-size: 11px; color: #a3a3a3; }
  .sw-item.action { color: #737373; font-size: 12px; border-top: 1px solid #e5e5e5; margin-top: 4px; padding-top: 10px; border-radius: 0 0 6px 6px; }
  .sw-item.action:first-of-type { margin-top: 4px; }
  .sw-item.action:hover { color: #1c1917; }
  .sw-sep { height: 1px; background: #e5e5e5; margin: 4px 6px; }

  .lists-header {
    position: sticky; top: 48px; z-index: 15; background: #f5f5f5;
    padding: 8px 20px 10px; border-bottom: 1px solid #e5e5e5;
  }
  .lists-header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 2px; }
  .list-name-editable {
    font-size: 22px; font-weight: 600; letter-spacing: -0.02em; border: none;
    background: none; color: #1c1917; font-family: inherit; padding: 2px 0;
    outline: none; min-width: 60px; width: 100%; line-height: 1.3;
  }
  .list-name-editable:focus { border-bottom: 2px solid #1c1917; }
  .lists-header-actions { display: flex; gap: 6px; flex-shrink: 0; padding-top: 4px; }
  .lists-header-actions button {
    font-family: inherit; font-size: 12px; font-weight: 500; padding: 6px 12px;
    border-radius: 6px; border: 1px solid #e5e5e5; background: #fff; color: #1c1917;
    cursor: pointer; min-height: 32px; transition: background 0.15s; white-space: nowrap;
  }
  .lists-header-actions button:hover { background: #fafafa; }
  .lists-header-actions button:focus-visible { outline: 2px solid #1c1917; outline-offset: 2px; }
  .lists-subtitle { font-size: 12px; color: #a3a3a3; letter-spacing: 0.01em; padding-top: 2px; }

  .palette-details { margin-top: 6px; }
  .palette-details summary {
    font-size: 11px; color: #a3a3a3; text-transform: uppercase; letter-spacing: 0.04em;
    font-weight: 500; cursor: pointer; list-style: none; display: flex; align-items: center; gap: 4px;
    user-select: none;
  }
  .palette-details summary::-webkit-details-marker { display: none; }
  .palette-details summary::before { content: '▸'; font-size: 9px; transition: transform 0.15s; }
  .palette-details[open] summary::before { transform: rotate(90deg); }
  .palette-inner { padding: 8px 0 4px; }
  .palette-presets { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 10px; }
  .scheme-swatch {
    width: 100%; aspect-ratio: 1; border-radius: 50%; cursor: pointer; border: 2px solid transparent;
    display: flex; align-items: center; justify-content: center; transition: border-color 0.15s, transform 0.1s;
    overflow: hidden; position: relative; max-width: 28px;

<script>
function toggleDarkMode() {
  var editor = document.getElementById('editor');
  editor.classList.toggle('dark');
  document.body.classList.toggle('dark');
  localStorage.setItem('ff-dark', editor.classList.contains('dark') ? '1' : '0');
}
(function() {
  if (localStorage.getItem('ff-dark') === '1') {
    document.getElementById('editor').classList.add('dark');
    document.body.classList.add('dark');
  }
})();

function showPage(page) {
  var formsView = document.getElementById('pageFormsView');
  var listsView = document.getElementById('pageListsView');
  var tabs = document.querySelectorAll('.page-tabs button');
  var dlBtn = document.getElementById('navDownloadBtn');
  if (page === 'forms') {
    formsView.classList.remove('hidden');
    listsView.classList.add('hidden');
    tabs[0].classList.add('active');
    tabs[1].classList.remove('active');
    if (dlBtn) dlBtn.classList.add('visible');
  } else {
    formsView.classList.add('hidden');
    listsView.classList.remove('hidden');
    tabs[1].classList.add('active');

function hexToRgb(hex) {
  var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
}

function srgbLuminance(r, g, b) {
  var rs = r / 255, gs = g / 255, bs = b / 255;
  rs = rs <= 0.03928 ? rs / 12.92 : Math.pow((rs + 0.055) / 1.055, 2.4);
  gs = gs <= 0.03928 ? gs / 12.92 : Math.pow((gs + 0.055) / 1.055, 2.4);
  bs = bs <= 0.03928 ? bs / 12.92 : Math.pow((bs + 0.055) / 1.055, 2.4);
  return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
}

function contrastRatio(hex1, hex2) {
  var c1 = hexToRgb(hex1), c2 = hexToRgb(hex2);
  if (!c1 || !c2) return null;
  var l1 = srgbLuminance(c1.r, c1.g, c1.b);
  var l2 = srgbLuminance(c2.r, c2.g, c2.b);
  var lighter = Math.max(l1, l2), darker = Math.min(l1, l2);
  return (lighter + 0.05) / (darker + 0.05);
}

function updateContrastBadges() {
  var baseTheme = themes[currentTheme];
  var bg = customBg || baseTheme.surface;
  if (!bg.startsWith('#')) bg = baseTheme.card || '#ffffff';
  var headerText = customHeaderText || baseTheme.text;
  var bodyText = customBodyText || baseTheme.textSecondary;

  var hBadge = document.getElementById('headerTextContrast');
  var bBadge = document.getElementById('bodyTextContrast');

  var hRatio = contrastRatio(headerText, bg);
  var bRatio = contrastRatio(bodyText, bg);

  if (hBadge && hRatio !== null) {
    var hPass = hRatio >= 4.5;
    hBadge.className = 'contrast-warning' + (hPass ? ' pass' : '');
    hBadge.textContent = hRatio.toFixed(1) + ':1 ' + (hPass ? 'AA ✓' : 'AA ✗');
    hBadge.title = 'WCAG AA requires 4.5:1 for normal text';
  }
  if (bBadge && bRatio !== null) {
    var bPass = bRatio >= 4.5;
    bBadge.className = 'contrast-warning' + (bPass ? ' pass' : '');
    bBadge.textContent = bRatio.toFixed(1) + ':1 ' + (bPass ? 'AA ✓' : 'AA ✗');
    bBadge.title = 'WCAG AA requires 4.5:1 for normal text';
  }
}

function setTheme(name) {
  currentTheme = name;
  customAccent = null;
  customBg = null;
  customHeaderText = null;
  customBodyText = null;

  var t = themes[name];
  var picker = document.getElementById('accentColor');
  var themeAccent = t.accent;
  if (themeAccent.startsWith('#') && themeAccent.length === 7) {
    picker.value = themeAccent;
  } else {
    picker.value = '#2563eb';
  }
  document.getElementById('accentHex').textContent = picker.value;

  var bgVal = t.surface.startsWith('#') ? t.surface : (t.card || '#ffffff');
  document.getElementById('bgColor').value = bgVal.length === 7 ? bgVal : '#ffffff';
  document.getElementById('bgHex').textContent = bgVal;

  var htVal = t.text;
  document.getElementById('headerTextColor').value = htVal;
  document.getElementById('headerTextHex').textContent = htVal;

  var btVal = t.textSecondary;
  document.getElementById('bodyTextColor').value = btVal;
  document.getElementById('bodyTextHex').textContent = btVal;

  var suggestedFont = t.suggestedFont || 'system';
  document.getElementById('fontFamily').value = suggestedFont;
  var fontEntry = FONT_LIST.find(function(f) { return f.key === suggestedFont; });
  if (fontEntry) document.getElementById('fontSearchLabel').textContent = fontEntry.name;
  var suggestedNumberStyle = t.suggestedNumberStyle || 'filled';
  document.getElementById('numberStyle').value = suggestedNumberStyle;
  document.querySelectorAll('.theme-swatch').forEach(function(s) { s.classList.toggle('active', s.dataset.theme === name); });
  updateContrastBadges();
  renderPreview();
}

function showTab(tab) {
  var editor = document.getElementById('editor');
  var preview = document.getElementById('previewPane');
  var buttons = document.querySelectorAll('#mobileTabs button');
  if (tab === 'edit') {
    editor.classList.remove('hidden');
    preview.classList.add('hidden');
    buttons[0].classList.add('active');
    buttons[1].classList.remove('active');
  } else {
    editor.classList.add('hidden');
    preview.classList.remove('hidden');
    buttons[1].classList.add('active');
    buttons[0].classList.remove('active');
    renderPreview();
  }
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escJs(s) { return (s||'').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n'); }

function addQuestion() {
  questions.push({
    id: 'q' + nextId++, title: 'new question', hint: '', type: 'text', required: false, options: [], placeholder: ''
  });
  renderEditor(); renderPreview();
}

function removeQuestion(idx) {
  questions.splice(idx, 1);
  renderEditor(); renderPreview();
}

function moveQuestion(idx, dir) {
  var newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= questions.length) return;
  var temp = questions[idx];
  questions[idx] = questions[newIdx];
  questions[newIdx] = temp;
  renderEditor(); renderPreview();
}

function addOption(qIdx) {
  if (!questions[qIdx].options) questions[qIdx].options = [];
  var n = questions[qIdx].options.length + 1;
  questions[qIdx].options.push({ label: 'option ' + n, sub: '', value: 'option_' + n });
  renderEditor(); renderPreview();
}

function removeOption(qIdx, oIdx) {
  questions[qIdx].options.splice(oIdx, 1);
  renderEditor(); renderPreview();
}

function updateOption(qIdx, oIdx, field, value) {
  questions[qIdx].options[oIdx][field] = value;
  if (field === 'label') questions[qIdx].options[oIdx].value = slugify(value);
  renderPreview();
}

function addMatrixRow(qIdx) {
  if (!questions[qIdx].matrixRows) questions[qIdx].matrixRows = [];
  var n = questions[qIdx].matrixRows.length + 1;
  questions[qIdx].matrixRows.push({ label: 'activity ' + n, sub: '', value: 'activity_' + n });
  renderEditor(); renderPreview();
}

function removeMatrixRow(qIdx, rIdx) {
  questions[qIdx].matrixRows.splice(rIdx, 1);
  renderEditor(); renderPreview();
}

function updateMatrixRow(qIdx, rIdx, field, value) {
  questions[qIdx].matrixRows[rIdx][field] = value;
  if (field === 'label') questions[qIdx].matrixRows[rIdx].value = slugify(value);
  renderPreview();
}

var fontDDFilter = 'all';
function toggleFontDD() {
  var dd = document.getElementById('fontDD');
  var isHidden = dd.classList.contains('hidden');
  dd.classList.toggle('hidden');
  if (isHidden) {
    var search = document.getElementById('fontDDSearch');
    search.value = '';
    search.focus();
    renderFontDDList();
  }
}
function closeFontDD() {
  document.getElementById('fontDD').classList.add('hidden');
}
function setFontFilter(cat) {
  fontDDFilter = cat;
  document.querySelectorAll('.font-dd-filter').forEach(function(b) {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  filterFontDD();
}
function filterFontDD() { renderFontDDList(); }
function renderFontDDList() {
  var q = (document.getElementById('fontDDSearch').value || '').toLowerCase();
  var cur = document.getElementById('fontFamily').value;
  var filtered = FONT_LIST.filter(function(f) {
    if (fontDDFilter !== 'all' && f.cat !== fontDDFilter) return false;
    if (q && f.name.toLowerCase().indexOf(q) === -1) return false;
    return true;
  });
  var list = document.getElementById('fontDDList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="font-dd-empty">No fonts found</div>';
    return;
  }
  list.innerHTML = filtered.map(function(f) {
    return '<div class="font-dd-item' + (f.key === cur ? ' active' : '') + '" onclick="selectFont(\'' + f.key + '\')">' +
      '<span>' + f.name + '</span>' +
      '<span class="font-cat">' + f.cat + '</span>' +
    '</div>';
  }).join('');
}
function selectFont(key) {
  var font = FONT_LIST.find(function(f) { return f.key === key; });
  if (!font) return;
  document.getElementById('fontFamily').value = key;
  document.getElementById('fontSearchLabel').textContent = font.name;
  closeFontDD();
  renderPreview();
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('#fontSearchWrap')) closeFontDD();
});

function renderPreview() {
  var result = generateFormHtml();
  var html = result.html;
  var startMarker = 'google.script.run';
  var endMarker = '.processForm(data);';
  var si = html.indexOf(startMarker);
  var ei = html.indexOf(endMarker);
  if (si !== -1 && ei !== -1) {
    html = html.substring(0, si) +
      'document.getElementById(\'learningForm\').style.display = \'none\';\n' +
      '        document.getElementById(\'success\').classList.add(\'visible\');\n' +
      '        window.scrollTo({ top: 0, behavior: \'smooth\' });' +
      html.substring(ei + endMarker.length);
  }
  var frame = document.getElementById('previewFrame');
  frame.srcdoc = html;
}

function downloadFiles() {
  var result = generateFormHtml();
  var codeGs = generateCodeGs(result.sheetColumns);
  var formTitle = (document.getElementById('formTitle').value || 'form').trim().toLowerCase().replace(/[^a-z0-9]+/g, '-');

  var zip = new JSZip();
  zip.file('form.html', result.html);
  zip.file('Code.gs', codeGs);
  zip.generateAsync({ type: 'blob' }).then(function(blob) {
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = formTitle + '.zip';
    a.click();
    URL.revokeObjectURL(a.href);
  });
}

      });
      var row = document.createElement('div');
      row.className = 'roster-row' + (checked ? ' checked' : '');
      row.tabIndex = 0;
      row.setAttribute('role', 'checkbox');
      row.setAttribute('aria-checked', checked);
      row.setAttribute('aria-label', titleVal);
      row.innerHTML =
        '<input type="checkbox" tabindex="-1" ' + (checked ? 'checked' : '') + ' aria-hidden="true">' +
        '<div class="person-info"><div class="person-name" title="Click to edit" tabindex="0" role="button" aria-label="Edit ' + esc(titleVal) + '">' + esc(titleVal) + '</div><div class="person-pills">' + pillsHtml + '</div></div>' +
        '<button class="item-remove" onclick="event.stopPropagation();removeItem(\'' + item.id + '\')" title="Remove" aria-label="Remove ' + esc(titleVal) + '">&times;</button>';
      row.addEventListener('click', (function(id) { return function(e) {
        if (e.target.classList.contains('item-remove')) return;
        if (e.target.closest('.person-name')) { openEditCard(id); return; }
        toggleItem(id); };
      })(item.id));
      row.addEventListener('keydown', (function(id) { return function(e) {
        if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleItem(id); }
      };})(item.id));
      var nameEl = row.querySelector('.person-name');
      if (nameEl) {
        nameEl.addEventListener('keydown', (function(id) { return function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); openEditCard(id); }
        };})(item.id));
      }
      listEl.appendChild(row);
    });
  }

  // Add item bar
  var addBar = document.getElementById('addItemBar');
  if (editingItemId !== null) {
    var editItem = list.items.find(function(it) { return it.id === editingItemId; });
    if (!editItem) {
      editingItemId = null;
      addBar.innerHTML = '';
    } else {
      var editFields = list.fields.map(function(f, fi) {
        var isId = fi === 0;
        var inputAttrs = isId ? ' oninput="toggleAddCardBtn()"' : '';
        return '<div class="add-item-field">' +
          '<label class="add-item-label">' + esc(f.label) + '</label>' +
          '<input type="text" class="add-item-input" data-field="' + f.key + '" value="' + esc(editItem[f.key] || '') + '" placeholder="' + esc(f.label) + '"' + inputAttrs + '>' +
        '</div>';
      }).join('');
      var idVal = editItem[list.fields[0].key] || '';
      addBar.innerHTML = '<div class="add-item-card">' + editFields +
        '<div class="add-item-actions">' +
          '<button class="add-item-cancel" onclick="cancelEdit()">Cancel</button>' +
          '<button class="add-item-submit" onclick="saveEditedItem()"' + (!idVal.trim() ? ' disabled' : '') + '>Save</button>' +
        '</div>' +
      '</div>';
    }
  } else if (!addCardOpen) {
    addBar.innerHTML = '';
  } else {
    var cardFields = list.fields.map(function(f, fi) {
      var isId = fi === 0;
      var inputAttrs = isId
        ? ' oninput="toggleAddCardBtn()" onkeydown="if(event.key===\'Enter\'){addItemFromCard();}"'
        : ' onkeydown="if(event.key===\'Enter\'){addItemFromCard();}"';
      return '<div class="add-item-field">' +
        '<label class="add-item-label">' + esc(f.label) + '</label>' +
        '<input type="text" class="add-item-input" data-field="' + f.key + '" placeholder="' + esc(f.label) + '"' + inputAttrs + '>' +
      '</div>';
    }).join('');
    addBar.innerHTML = '<div class="add-item-card">' + cardFields +
      '<button class="add-item-submit" onclick="addItemFromCard()" disabled>Add</button>' +
    '</div>';
  }

  // Danger zone
  var dz = document.getElementById('dangerZone');
  if (deleteConfirm) {
    dz.innerHTML = '<div class="danger-confirm-box"><span>This can\'t be undone.</span><button class="dc-yes" onclick="confirmDeleteList()">delete forever</button><button class="dc-no" onclick="cancelDelete()">never mind</button></div>';
  } else {
    dz.innerHTML = '<button class="danger-link" onclick="startDelete()">delete this list</button>';
  }

  
}

var _swClickTs = 0;
var _filterClickTs = 0;
var _cardClickTs = 0;
function toggleSwitcher() { _swClickTs = Date.now(); switcherOpen = !switcherOpen; openFilterKey = null; renderListsPage(); }
function closeSwitcher() { if (switcherOpen) { switcherOpen = false; renderListsPage(); } }
document.addEventListener('click', function(e) {
  if (Date.now() - _swClickTs < 100) return;
  if (Date.now() - _filterClickTs < 100) return;
  if (Date.now() - _cardClickTs < 100) return;
  var changed = false;
  if (switcherOpen && !e.target.closest('.list-switcher')) { switcherOpen = false; changed = true; }
  if (openFilterKey && !e.target.closest('.filter-dd')) { openFilterKey = null; changed = true; }
  if (addCardOpen && !e.target.closest('.add-item-card')) { addCardOpen = false; changed = true; }
  if (editingItemId !== null && !e.target.closest('.add-item-card')) { editingItemId = null; changed = true; }
  if (changed) renderListsPage();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (editingItemId !== null) { editingItemId = null; renderListsPage(); }
    else if (addCardOpen) { addCardOpen = false; renderListsPage(); }
  }
});

function switchList(id) {
  listsData.currentListId = id;
  listFilters = {}; listSearch = ''; switcherOpen = false; deleteConfirm = false; fieldSetupOpen = false; addCardOpen = false; editingItemId = null;
  saveLists(); renderListsPage();
}

function createNewList() {
  var nl = { id: lid(), name: 'Untitled list', colorScheme: 'bauhaus', copyField: 'name',
    fields: [{key:'name',label:'Name'}], items: [], selected: [] };
  listsData.lists.push(nl);
  listsData.currentListId = nl.id;
  listFilters = {}; listSearch = ''; switcherOpen = false; fieldSetupOpen = true; addCardOpen = false; editingItemId = null;
  saveLists(); renderListsPage();
  var inp = document.querySelector('.list-name-editable');
  if (inp) { inp.focus(); inp.select(); }
}

function duplicateCurrentList() {
  var src = curList();
  var nl = JSON.parse(JSON.stringify(src));
  nl.id = lid();
  nl.name = 'Copy of ' + src.name;
  nl.selected = [];
  nl.items.forEach(function(it) { it.id = iid(); });
  listsData.lists.push(nl);
  listsData.currentListId = nl.id;
  listFilters = {}; listSearch = ''; switcherOpen = false;
  saveLists(); renderListsPage();
}

function renameCurrentList(name) {
  var n = name.trim();
  if (!n) n = 'Untitled list';
  curList().name = n;
  saveLists(); renderListsPage();
}

function startDelete() { deleteConfirm = true; renderListsPage(); }
function cancelDelete() { deleteConfirm = false; renderListsPage(); }
function confirmDeleteList() {
  var list = curList();
  listsData.lists = listsData.lists.filter(function(l) { return l.id !== list.id; });
  if (listsData.lists.length === 0) {
    var id = lid();
    var items = DEFAULT_ITEMS.map(function(it) { var o = {}; for (var k in it) o[k] = it[k]; o.id = iid(); return o; });
    listsData.lists.push({ id: id, name: 'my list', colorScheme: 'bauhaus', copyField: 'email',
      fields: [{key:'name',label:'Name'},{key:'email',label:'Email'},{key:'role',label:'Role'},{key:'team',label:'Team'},{key:'city',label:'City'}],
      items: items, selected: [] });
    listsData.currentListId = id;
  } else {
    listsData.currentListId = listsData.lists[0].id;
  }
  deleteConfirm = false; listFilters = {}; listSearch = '';
  saveLists(); renderListsPage();
}

function setListScheme(key) {
  var l = curList();
  l.colorScheme = key;
  delete l.customColors;
  saveLists(); renderListsPage();
}
function setFieldColor(fieldIdx, color) {
  var l = curList();
  var scheme = COLOR_SCHEMES[l.colorScheme] || COLOR_SCHEMES.bauhaus;
  if (!l.customColors) {
    l.customColors = l.fields.slice(1).map(function(_, i) { return scheme.colors[i % scheme.colors.length]; });
  }
  l.customColors[fieldIdx] = color;
  saveLists(); renderListsPage();
}
function setCopyField(key) { curList().copyField = key; saveLists(); renderListsPage(); }

function toggleFieldSetup() { fieldSetupOpen = !fieldSetupOpen; renderListsPage(); }

function addCategory() {
  var list = curList();
  var key = 'f' + Date.now().toString(36);
  list.fields.push({ key: key, label: '' });
  saveLists(); renderListsPage();
  var panel = document.querySelector('.field-setup-panel');
  if (panel) {
    var inputs = panel.querySelectorAll('.field-label-input');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }
}

function removeField(key) {
  var list = curList();
  list.fields = list.fields.filter(function(f) { return f.key !== key; });
  if (list.copyField === key) list.copyField = list.fields[0].key;
  saveLists(); renderListsPage();
}

function renameField(key, label) {
  var list = curList();
  var f = list.fields.find(function(f) { return f.key === key; });
  if (!f) return;
  var newLabel = label.trim();
  if (!newLabel && list.fields.indexOf(f) === 0) return;
  f.label = newLabel;
  saveLists(); renderListsPage();
}

function setFilter(key, val) { listFilters[key] = val ? [val] : []; renderListsPage(); }
function setSearch(val) { listSearch = val; renderListsPage(); }

function toggleItem(id) {
  var list = curList();
  var idx = list.selected.indexOf(id);
  if (idx >= 0) list.selected.splice(idx, 1);
  else list.selected.push(id);
  saveLists(); renderListsPage();
}

function selectAllVisible() {
  var list = curList();
  var vis = getVisibleItems();
  vis.forEach(function(it) { if (list.selected.indexOf(it.id) === -1) list.selected.push(it.id); });
  saveLists(); renderListsPage();
}

function clearAllSelected() {
  curList().selected = [];
  saveLists(); renderListsPage();
}

function openAddCard() {
  addCardOpen = true;
  editingItemId = null;
  _cardClickTs = Date.now();
  renderListsPage();
  var card = document.querySelector('.add-item-card');
  if (card) { var inp = card.querySelector('input'); if (inp) inp.focus(); }
}

function openEditCard(id) {
  editingItemId = id;
  addCardOpen = false;
  _cardClickTs = Date.now();
  renderListsPage();
  var card = document.querySelector('.add-item-card');
  if (card) { var inp = card.querySelector('input'); if (inp) inp.focus(); }
}

function cancelEdit() {
  editingItemId = null;
  renderListsPage();
}

function saveEditedItem() {
  var list = curList();
  var card = document.querySelector('.add-item-card');
  if (!card || !editingItemId) return;
  var item = list.items.find(function(it) { return it.id === editingItemId; });
  if (!item) { editingItemId = null; renderListsPage(); return; }
  var inputs = card.querySelectorAll('input');
  var idInput = inputs[0];
  if (!idInput || !idInput.value.trim()) return;
  inputs.forEach(function(inp) { item[inp.dataset.field] = inp.value.trim(); });
  editingItemId = null;
  saveLists(); renderListsPage();
}

function toggleAddCardBtn() {
  var card = document.querySelector('.add-item-card');
  if (!card) return;
  var idInput = card.querySelector('input');
  var btn = card.querySelector('.add-item-submit');
  if (btn) btn.disabled = !idInput || !idInput.value.trim();
}

function addItemFromCard() {
  var list = curList();
  var card = document.querySelector('.add-item-card');
  if (!card) return;
  var inputs = card.querySelectorAll('input');
  var idInput = inputs[0];
  if (!idInput || !idInput.value.trim()) return;
  var item = { id: iid() };
  inputs.forEach(function(inp) { item[inp.dataset.field] = inp.value.trim(); });
  list.items.push(item);
  saveLists(); renderListsPage();
  var newCard = document.querySelector('.add-item-card');
  if (newCard) { var firstInp = newCard.querySelector('input'); if (firstInp) firstInp.focus(); }
}

function removeItem(id) {
  var list = curList();
  list.items = list.items.filter(function(it) { return it.id !== id; });
  list.selected = list.selected.filter(function(s) { return s !== id; });
  saveLists(); renderListsPage();
}

var rosterToastTimer;

function doCopy() {
  var list = curList();
  if (!list.selected.length) return;
  var sel = new Set(list.selected);
  var vals = list.items.filter(function(it) { return sel.has(it.id); }).map(function(it) { return it[list.copyField] || it[list.fields[0].key] || ''; });
  var text = vals.join(', ');
  var inlineBtn = document.getElementById('copyInlineBtn');
  var toast = document.getElementById('rosterToast');
  navigator.clipboard.writeText(text).then(function() {
    if (inlineBtn) { inlineBtn.classList.add('copied'); inlineBtn.textContent = 'Copied!'; }
    toast.textContent = vals.length + ' value' + (vals.length === 1 ? '' : 's') + ' copied';
    toast.classList.add('show');
    clearTimeout(rosterToastTimer);
    rosterToastTimer = setTimeout(function() { toast.classList.remove('show'); }, 2000);
    setTimeout(function() {
      if (inlineBtn) inlineBtn.classList.remove('copied');
      renderListsPage();
    }, 1500);
  }).catch(function() {
    toast.textContent = 'Copy failed — try again';
    toast.classList.add('show');
    clearTimeout(rosterToastTimer);
    rosterToastTimer = setTimeout(function() { toast.classList.remove('show'); }, 2000);
  });
}


renderListsPage();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}

window.addEventListener('beforeunload', function(e) {
  e.preventDefault();
});

renderEditor();
setTheme(currentTheme);
</script>
</body>
